<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Driver Approvals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 20px;
        }
        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header i {
            font-size: 3rem;
            color: #f59e0b;
        }
        .header h1 {
            font-size: 1.5rem;
            margin-top: 0.5rem;
            color: #1e293b;
        }
        .driver-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
        }
        .driver-info {
            margin-bottom: 0.5rem;
        }
        .driver-name {
            font-weight: 800;
            font-size: 1.1rem;
            color: #1e293b;
        }
        .driver-detail {
            font-size: 0.8rem;
            color: #64748b;
            margin: 0.25rem 0;
        }
        .driver-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .btn-approve {
            background: #10b981;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-reject {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 2rem;
        }
        .no-drivers {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <i class="fas fa-user-shield"></i>
            <h1>Admin Panel - Driver Approvals</h1>
            <p style="color: #64748b;">Approve or reject driver registration requests</p>
        </div>

        <div id="driversList">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading requests...</p>
            </div>
        </div>

        <button style="width: 100%; margin-top: 1rem; background: #475569; color: white; border: none; padding: 0.75rem; border-radius: 40px; cursor: pointer; font-weight: 600;" onclick="window.location.href='/dashboard'">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>
    </div>

    <script>
        async function loadPendingDrivers() {
            const driversList = document.getElementById('driversList');
            
            try {
                const response = await fetch('/api/drivers/pending');
                const data = await response.json();
                
                if (data.drivers.length === 0) {
                    driversList.innerHTML = `
                        <div class="no-drivers">
                            <i class="fas fa-check-circle" style="font-size: 2rem; color: #10b981; margin-bottom: 0.5rem; display: block;"></i>
                            <p>No pending driver requests</p>
                            <p style="font-size: 0.7rem;">All drivers are approved</p>
                        </div>
                    `;
                    return;
                }
                
                driversList.innerHTML = '';
                data.drivers.forEach(driver => {
                    const card = document.createElement('div');
                    card.className = 'driver-card';
                    card.innerHTML = `
                        <div class="driver-info">
                            <div class="driver-name">🚌 ${escapeHtml(driver.bus_name)}</div>
                            <div class="driver-detail"><i class="fas fa-user"></i> ${escapeHtml(driver.driver_name)}</div>
                            <div class="driver-detail"><i class="fas fa-phone"></i> ${escapeHtml(driver.phone)}</div>
                            <div class="driver-detail"><i class="fas fa-envelope"></i> ${escapeHtml(driver.email) || 'Not provided'}</div>
                            <div class="driver-detail"><i class="fas fa-clock"></i> Requested: ${new Date(driver.requested_at).toLocaleString()}</div>
                        </div>
                        <div class="driver-actions">
                            <button class="btn-approve" onclick="approveDriver('${driver.id}')">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button class="btn-reject" onclick="rejectDriver('${driver.id}')">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        </div>
                    `;
                    driversList.appendChild(card);
                });
            } catch (error) {
                driversList.innerHTML = `
                    <div class="no-drivers">
                        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: #ef4444; margin-bottom: 0.5rem; display: block;"></i>
                        <p>Error loading drivers</p>
                    </div>
                `;
            }
        }

        async function approveDriver(driverId) {
            try {
                const response = await fetch(`/api/drivers/approve/${driverId}`, {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.success) {
                    alert('Driver approved successfully!');
                    loadPendingDrivers();
                } else {
                    alert('Error approving driver');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        async function rejectDriver(driverId) {
            try {
                const response = await fetch(`/api/drivers/reject/${driverId}`, {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.success) {
                    alert('Driver rejected');
                    loadPendingDrivers();
                } else {
                    alert('Error rejecting driver');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadPendingDrivers();
    </script>
</body>
</html>
