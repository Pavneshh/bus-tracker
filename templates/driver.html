<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Driver Mode - Share Live Location</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 16px;
        }
        
        .driver-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .header i {
            font-size: 2.5rem;
            color: #f59e0b;
        }
        
        .header h1 {
            font-size: 1.4rem;
            margin-top: 8px;
            color: #1e293b;
        }
        
        .header p {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 4px;
        }
        
        .bus-select {
            margin-bottom: 20px;
        }
        
        .bus-select label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
            font-size: 0.85rem;
        }
        
        .bus-select label i {
            margin-right: 6px;
            color: #667eea;
        }
        
        .bus-select select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .bus-select select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .status-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        
        .status-active {
            background: #dcfce7;
            color: #15803d;
        }
        
        .status-inactive {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-approved {
            background: #dcfce7;
            color: #15803d;
        }
        
        .status-rejected {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .live-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: blink 1.5s infinite;
            display: inline-block;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        #locationStatus {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .coords {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 8px;
            font-family: monospace;
            word-break: break-all;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            font-family: inherit;
            min-height: 52px;
            touch-action: manipulation;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            margin-top: 12px;
        }
        
        .btn-register {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
            margin-top: 12px;
        }
        
        .btn-start:disabled, .btn-stop:disabled, .btn-register:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .success-msg {
            background: #dcfce7;
            color: #15803d;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-top: 8px;
        }
        
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-top: 8px;
        }
        
        .warning-msg {
            background: #fef3c7;
            color: #92400e;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-top: 8px;
        }
        
        .debug-info {
            background: #e0e7ff;
            color: #3730a3;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            margin-top: 12px;
            font-family: monospace;
            text-align: left;
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .status-info {
            font-size: 0.7rem;
            margin-top: 8px;
            padding: 8px;
            border-radius: 12px;
        }
        
        /* Tablet and Desktop */
        @media (min-width: 768px) {
            body {
                padding: 24px;
            }
            
            .driver-container {
                padding: 28px;
            }
            
            .header i {
                font-size: 3rem;
            }
            
            .header h1 {
                font-size: 1.6rem;
            }
            
            .btn {
                padding: 14px;
                font-size: 1rem;
            }
        }
        
        /* Touch-friendly */
        button, select {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div class="driver-container">
        <div class="header">
            <i class="fas fa-steering-wheel"></i>
            <h1>Driver Mode</h1>
            <p>Share your live location</p>
        </div>

        <div class="bus-select">
            <label><i class="fas fa-bus"></i> Select Your Bus</label>
            <select id="busSelect">
                <option value="">-- Select Bus --</option>
                <option value="VISHWAKARMA TRAVELS">VISHWAKARMA TRAVELS</option>
                <option value="JAY KHODIYAR BUS SERVICE">JAY KHODIYAR BUS SERVICE</option>
                <option value="Jay Travels (Ekta Travels)">Jay Travels (Ekta Travels)</option>
                <option value="J K travels">J K travels</option>
            </select>
        </div>

        <div class="status-card">
            <div class="status-badge status-inactive" id="statusBadge">
                <i class="fas fa-circle"></i> Not Sharing
            </div>
            <div id="locationStatus">
                <i class="fas fa-map-marker-alt"></i> Select a bus and click Start
            </div>
            <div class="coords" id="coordsDisplay"></div>
            <div id="messageDisplay"></div>
            <div id="driverStatusInfo" class="status-info"></div>
            <div class="debug-info" id="debugInfo"></div>
        </div>

        <button class="btn btn-start" id="startBtn">
            <i class="fas fa-play"></i> Start Sharing Location
        </button>
        <button class="btn btn-stop" id="stopBtn" disabled>
            <i class="fas fa-stop"></i> Stop Sharing
        </button>
        <button class="btn btn-register" id="registerBtn" onclick="window.location.href='/driver-register'">
            <i class="fas fa-id-card"></i> Register as Driver
        </button>
    </div>

    <script>
        let intervalId = null;
        let isSharing = false;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const registerBtn = document.getElementById('registerBtn');
        const busSelect = document.getElementById('busSelect');
        const statusBadge = document.getElementById('statusBadge');
        const locationStatus = document.getElementById('locationStatus');
        const coordsDisplay = document.getElementById('coordsDisplay');
        const messageDisplay = document.getElementById('messageDisplay');
        const debugInfo = document.getElementById('debugInfo');
        const driverStatusInfo = document.getElementById('driverStatusInfo');

        function addDebugLog(message) {
            console.log(message);
            debugInfo.style.display = 'block';
            debugInfo.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
            const lines = debugInfo.innerHTML.split('</div>');
            if (lines.length > 10) {
                debugInfo.innerHTML = lines.slice(-10).join('</div>');
            }
        }

        function showMessage(text, type = 'success') {
            const className = type === 'error' ? 'error-msg' : (type === 'warning' ? 'warning-msg' : 'success-msg');
            messageDisplay.innerHTML = `<div class="${className}">${type === 'error' ? '❌ ' : type === 'warning' ? '⚠️ ' : '✅ '}${text}</div>`;
            setTimeout(() => {
                if (messageDisplay.innerHTML === `<div class="${className}">${type === 'error' ? '❌ ' : type === 'warning' ? '⚠️ ' : '✅ '}${text}</div>`) {
                    messageDisplay.innerHTML = '';
                }
            }, 5000);
        }

        async function checkDriverStatus() {
            const busId = busSelect.value;
            if (!busId) {
                driverStatusInfo.innerHTML = '';
                return false;
            }
            
            try {
                addDebugLog(`Checking status for bus: ${busId}`);
                const response = await fetch(`/api/drivers/status/${encodeURIComponent(busId)}`);
                const data = await response.json();
                
                addDebugLog(`Status response: ${JSON.stringify(data)}`);
                
                if (!data.registered) {
                    driverStatusInfo.innerHTML = `
                        <div style="background: #fef3c7; padding: 10px; border-radius: 12px; color: #92400e; font-size: 0.7rem;">
                            <i class="fas fa-exclamation-triangle"></i> Not registered. Please register first.
                        </div>
                    `;
                    startBtn.disabled = true;
                    return false;
                }
                
                if (data.status === 'pending') {
                    driverStatusInfo.innerHTML = `
                        <div style="background: #fef3c7; padding: 10px; border-radius: 12px; color: #92400e; font-size: 0.7rem;">
                            <i class="fas fa-clock"></i> Registration pending. Waiting for admin approval.
                        </div>
                    `;
                    startBtn.disabled = true;
                    return false;
                }
                
                if (data.status === 'rejected') {
                    driverStatusInfo.innerHTML = `
                        <div style="background: #fee2e2; padding: 10px; border-radius: 12px; color: #dc2626; font-size: 0.7rem;">
                            <i class="fas fa-times-circle"></i> Registration rejected. Please contact admin.
                        </div>
                    `;
                    startBtn.disabled = true;
                    return false;
                }
                
                if (data.status === 'approved') {
                    driverStatusInfo.innerHTML = `
                        <div style="background: #dcfce7; padding: 10px; border-radius: 12px; color: #15803d; font-size: 0.7rem;">
                            <i class="fas fa-check-circle"></i> ✅ Approved! You can share location.
                        </div>
                    `;
                    startBtn.disabled = false;
                    return true;
                }
                
                return false;
            } catch (error) {
                addDebugLog(`Error checking status: ${error.message}`);
                driverStatusInfo.innerHTML = `
                    <div style="background: #fee2e2; padding: 10px; border-radius: 12px; color: #dc2626; font-size: 0.7rem;">
                        <i class="fas fa-exclamation-triangle"></i> Error checking status. Please try again.
                    </div>
                `;
                return false;
            }
        }

        async function sendLocation(latitude, longitude) {
            const busId = busSelect.value;
            if (!busId) {
                showMessage('Please select a bus first', 'warning');
                return false;
            }

            addDebugLog(`Sending location for bus: ${busId}`);
            addDebugLog(`Coordinates: ${latitude}, ${longitude}`);

            try {
                const formData = new URLSearchParams();
                formData.append('lat', latitude);
                formData.append('lng', longitude);
                
                const response = await fetch(`/api/buses/${encodeURIComponent(busId)}/location`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                
                addDebugLog(`Response status: ${response.status}`);
                
                let data;
                const responseText = await response.text();
                addDebugLog(`Response text: ${responseText}`);
                
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    addDebugLog(`Failed to parse JSON: ${e.message}`);
                    showMessage('Server error. Please try again.', 'error');
                    return false;
                }
                
                if (data.success) {
                    addDebugLog('✅ Location sent successfully');
                    return true;
                } else {
                    addDebugLog(`❌ Server error: ${data.error}`);
                    showMessage(data.error || 'Failed to update location', 'error');
                    return false;
                }
            } catch (error) {
                addDebugLog(`❌ Network error: ${error.message}`);
                console.error('Error sending location:', error);
                showMessage('Network error. Check server connection.', 'error');
                return false;
            }
        }

        async function testBusExists() {
            const busId = busSelect.value;
            if (!busId) return false;
            
            try {
                const response = await fetch('/api/buses');
                const buses = await response.json();
                const busExists = buses.some(bus => 
                    bus.bus_id === busId || bus.bus_name === busId
                );
                addDebugLog(`Bus "${busId}" exists in database: ${busExists}`);
                if (!busExists) {
                    addDebugLog(`Available buses: ${buses.map(b => b.bus_name).join(', ')}`);
                }
                return busExists;
            } catch (error) {
                addDebugLog(`Error checking bus: ${error.message}`);
                return false;
            }
        }

        async function startSharing() {
            const busId = busSelect.value;
            if (!busId) {
                showMessage('Please select a bus first', 'warning');
                return;
            }

            addDebugLog('=== Starting Location Sharing ===');
            
            const isApproved = await checkDriverStatus();
            if (!isApproved) {
                showMessage('You are not approved to share location. Please register and wait for admin approval.', 'warning');
                return;
            }
            
            const busExists = await testBusExists();
            if (!busExists) {
                showMessage(`Bus "${busId}" not found. Please select a valid bus.`, 'error');
                return;
            }

            if (!navigator.geolocation) {
                showMessage('Geolocation is not supported by your browser', 'error');
                return;
            }

            showMessage('Getting your location...', 'warning');
            addDebugLog('Requesting geolocation permission...');

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const { latitude, longitude } = position.coords;
                    addDebugLog(`Got location: ${latitude}, ${longitude}`);
                    showMessage('Sending location to server...', 'warning');
                    
                    const success = await sendLocation(latitude, longitude);
                    
                    if (success) {
                        statusBadge.className = 'status-badge status-active';
                        statusBadge.innerHTML = '<span class="live-dot"></span> LIVE - Sharing';
                        locationStatus.innerHTML = '<i class="fas fa-location-dot"></i> Broadcasting every 5 seconds';
                        coordsDisplay.innerHTML = `📍 ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
                        showMessage(`Sharing location for ${busId}`);
                        addDebugLog('✅ Sharing started successfully');
                        
                        intervalId = setInterval(() => {
                            navigator.geolocation.getCurrentPosition(async (pos) => {
                                const lat = pos.coords.latitude;
                                const lng = pos.coords.longitude;
                                await sendLocation(lat, lng);
                                coordsDisplay.innerHTML = `📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                            }, (err) => {
                                addDebugLog(`Geolocation error: ${err.message}`);
                                showMessage('Failed to get current location', 'error');
                            });
                        }, 5000);
                        
                        isSharing = true;
                        startBtn.disabled = true;
                        stopBtn.disabled = false;
                        busSelect.disabled = true;
                        registerBtn.disabled = true;
                    } else {
                        addDebugLog('❌ Failed to start sharing - server rejected');
                        showMessage('Failed to start sharing. Please try again.', 'error');
                    }
                },
                (error) => {
                    let errorMsg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = 'Please allow location permission in browser settings';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = 'Location unavailable. Check GPS signal';
                            break;
                        case error.TIMEOUT:
                            errorMsg = 'Location request timeout. Please try again';
                            break;
                        default:
                            errorMsg = error.message;
                    }
                    addDebugLog(`Geolocation error: ${errorMsg}`);
                    showMessage(errorMsg, 'error');
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function stopSharing() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            
            isSharing = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            busSelect.disabled = false;
            registerBtn.disabled = false;
            
            statusBadge.className = 'status-badge status-inactive';
            statusBadge.innerHTML = '<i class="fas fa-circle"></i> Not Sharing';
            locationStatus.innerHTML = '<i class="fas fa-map-marker-alt"></i> Select a bus and click Start';
            coordsDisplay.innerHTML = '';
            showMessage('Location sharing stopped');
            addDebugLog('=== Location sharing stopped ===');
            
            checkDriverStatus();
        }

        busSelect.addEventListener('change', () => {
            debugInfo.innerHTML = '';
            debugInfo.style.display = 'none';
            checkDriverStatus();
            
            if (isSharing) {
                stopSharing();
            }
        });
        
        if (busSelect.value) {
            checkDriverStatus();
        }

        startBtn.addEventListener('click', startSharing);
        stopBtn.addEventListener('click', stopSharing);
        
        startBtn.disabled = true;
    </script>
</body>
</html>
